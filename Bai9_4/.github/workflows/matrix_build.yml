name: Bai 4 Matrix Build

on:
  push:
    paths:
      - 'Bai9_4/**' # Chỉ chạy khi ông thay đổi code trong thư mục Bai9_4

jobs:
  matrix-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run Matrix Test
        # Trỏ đúng vào file pom của Bài 4
        run: mvn -B test --file Bai9_4/pom.xml