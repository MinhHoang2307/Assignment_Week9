name: Bai 5 JaCoCo Coverage

on:
  push:
    paths:
      - 'Bai9_5/**'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Coverage with JaCoCo
        # Lệnh verify sẽ kích hoạt jacoco:check
        run: mvn -B verify --file Bai9_5/pom.xml

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Bai9_5/target/site/jacoco/