name: Bai 9 Logging Verification

on:
  push:
    paths:
      - 'Bai9_9/**' # Chỉ chạy khi ông sửa bài 9

jobs:
  logging-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Application and Generate Logs
        # Chạy app bằng Maven để đảm bảo sinh ra file log
        run: mvn compile exec:java -Dexec.mainClass="org.example.Calculator" --file Bai9_9/pom.xml

      - name: Verify Log File Existence
        # Kiểm tra xem file app.log có thực sự được tạo ra không
        run: |
          if [ -f "Bai9_9/logs/app.log" ]; then
            echo "SUCCESS: Log file found!"
            cat Bai9_9/logs/app.log
          else
            echo "ERROR: Log file not found!"
            exit 1
          fi