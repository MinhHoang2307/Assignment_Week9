name: Bai 8 Package Artifact

on:
  push:
    paths:
      - 'Bai9_8/**'

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR Package
        run: mvn clean package --file Bai9_8/pom.xml

      - name: Upload Executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar
          path: Bai9_8/target/*.jar