name: Bai 7 Automated Code Review

on:
  pull_request: # QUAN TRỌNG: Chỉ chạy khi tạo Pull Request
    branches: [ "main" ]
    paths:
      - 'Bai9_7/**'

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Cho phép Bot ghi bình luận
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle Inspection
        run: mvn checkstyle:check --file Bai9_7/pom.xml

      # Bot tự động đăng bình luận vào dòng code lỗi (Inline Feedback)
      - name: Run Checkstyle Reviewer
        if: failure() # Chỉ chạy nếu bước trên phát hiện lỗi
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: warning